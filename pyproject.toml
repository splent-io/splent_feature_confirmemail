[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_confirmemail"
version = "1.2.1"
requires-python = ">=3.13"
authors = [{ name = "DiversoLab", email = "diversolab@us.es" }]
dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

# ── Feature Contract (auto-generated by splent feature:release) ───────────────
# Do not edit manually — re-run `splent feature:release` to refresh.
[tool.splent.contract]
description = "Email confirmation feature: token-based account verification flow"

[tool.splent.contract.provides]
routes     = ["/confirm_user/<token>", "/confirmemail"]
blueprints = ["confirmemail_bp"]
models     = ["Confirmemail"]
commands   = []
hooks      = []
services   = ["ConfirmemailService"]
docker     = []

[tool.splent.contract.requires]
features = ["auth"]
env_vars = ["CONFIRM_EMAIL_SALT", "CONFIRM_EMAIL_TOKEN_MAX_AGE"]
