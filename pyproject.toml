[build-system]
requires = ["setuptools>=80.3.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "splent_feature_confirmemail"
version = "1.2.14"
requires-python = ">=3.13"
authors = [{ name = "DiversoLab", email = "diversolab@us.es" }]
dependencies = [

]

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
exclude = ["*.tests", "*.tests.*"]

# ── Feature Contract (auto-generated) ────────────────────────────────────────
# Do not edit manually — re-run `splent feature:contract --write` to refresh.
[tool.splent.contract]
description = "Email confirmation feature: token-based account verification flow"

[tool.splent.contract.provides]
routes     = ["/confirm_user/<token>", "/confirmemail"]
blueprints = []
models     = ["Confirmemail"]
commands   = []
hooks      = []
services   = ["ConfirmemailService"]
signals    = []
translations = []
docker     = []

[tool.splent.contract.requires]
features = ["auth"]
env_vars = ["CONFIRM_EMAIL_SALT", "CONFIRM_EMAIL_TOKEN_MAX_AGE"]
signals  = []

[tool.splent.contract.extensible]
services  = ["ConfirmemailService"]
templates = []
models    = ["Confirmemail"]
hooks     = []
routes    = false
